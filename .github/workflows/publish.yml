name: Publish to PyPI

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    name: Publish llm-clutch to PyPI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Python and uv
        uses: ./.github/actions/setup-python-uv
        with:
          working-directory: .

      - name: Build package
        run: uv build

      - name: Verify build artifacts
        run: ls -lh dist/

      # Uncomment the following to enable PyPI publishing:
      # - name: Publish to PyPI
      #   run: uv publish
      #   env:
      #     UV_PUBLISH_TOKEN: ${{ secrets.PYPI_TOKEN }}
      #
      # Prerequisites for publishing:
      #   1. Create a PyPI account at https://pypi.org
      #   2. Generate an API token (scoped to this package if possible)
      #   3. Add PYPI_TOKEN to your repository secrets
      #      (Settings → Secrets and variables → Actions → New repository secret)
      #   4. Uncomment the "Publish to PyPI" step above
      #   5. The GitHub secret PYPI_TOKEN will be exposed as UV_PUBLISH_TOKEN
      #      See uv publishing docs: https://docs.astral.sh/uv/guides/publish/
      #   6. Remove the "Verify build artifacts" step if desired

