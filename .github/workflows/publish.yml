name: Publish to PyPI

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    name: Publish llm-clutch to PyPI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: libs/llm-clutch

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Python and uv
        uses: ./.github/actions/setup-python-uv
        with:
          working-directory: libs/llm-clutch

      - name: Build package
        run: uv build

      - name: Verify build artifacts
        run: ls -lh dist/

      # Uncomment the following to enable PyPI publishing:
      # - name: Publish to PyPI
      #   run: uv publish
      #   env:
      #     UV_PUBLISH_TOKEN: ${{ secrets.PYPI_TOKEN }}
      #
      # Prerequisites for publishing:
      #   1. Add PYPI_TOKEN to your repository secrets
      #      (Settings → Secrets and variables → Actions → New repository secret)
      #   2. Create an account on https://pypi.org and generate an API token
      #   3. Uncomment the "Publish to PyPI" step above
      #   4. Remove the "Verify build artifacts" step if desired

