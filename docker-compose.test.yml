# docker-compose.test.yml
#
# Stub configuration for running tests in containers.
# Extend this file to add services your tests depend on (databases,
# message brokers, etc.) and to run the test suite inside Docker.
#
# Usage:
#   docker compose -f docker-compose.test.yml run --rm llm-clutch-tests
#
# Prerequisites:
#   Docker and Docker Compose installed (see ADR-006).

services:
  llm-clutch-tests:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["uv", "run", "pytest"]
    working_dir: /app
    volumes:
      - .:/app
