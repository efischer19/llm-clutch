site_name: "llm-clutch Documentation"
site_description: "Documentation for llm-clutch"
site_url: "https://efischer19.github.io/llm-clutch/"
docs_dir: docs-src

theme:
  name: material
  palette:
    primary: blue
    accent: orange
  features:
    - navigation.tabs
    - navigation.sections
    - search.suggest
    - search.highlight

plugins:
  - search

nav:
  - Home: index.md
  - llm-clutch:
      - Overview: https://github.com/efischer19/llm-clutch#readme
      - Quick Start: https://github.com/efischer19/llm-clutch#quick-start
      - Hardware Guide: HARDWARE_GUIDE.md
      - CLI Reference: cli.md
      - API Reference:
          - Overview: api/index.md
          - LLMClutch: api/clutch.md
          - Backends: api/backend.md
          - Infrastructure Manager: api/infra.md
      - Configuration: config.md
  - Development:
      - Contributing: CONTRIBUTING.md
      - Development Philosophy: DEVELOPMENT_PHILOSOPHY.md
      - Local Development Dependencies: LOCAL_DEVELOPMENT_DEPENDENCIES.md
      - Feature Request Automation: feature-request-automation.md
  - Guides:
      - Documentation Guide: DOCUMENTATION_README.md
      - Shared Library Versioning: SHARED_LIBRARY_VERSIONING.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - toc:
      permalink: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: "https://github.com/efischer19/llm-clutch"
